name: release

# Triggered by pushing a tag matching v*.
# GoReleaser builds platform-specific archives, publishes a GitHub
# Release on this repo, and pushes a Homebrew formula to
# Duragraph/homebrew-tap.
#
# Required secret: INFISICAL_HOMEBREW_TAP_TOKEN — fine-grained GitHub
# PAT (or GitHub App token) scoped to Duragraph/homebrew-tap with
# `contents:write`. Sourced from Infisical, mirrored as a GitHub Actions
# repository secret with the same name (matches the existing
# INFISICAL_DOCKER_USERNAME / INFISICAL_DOCKER_PASSWORD convention).
#
# Free-tier GoReleaser only — no Pro features used. See
# duragraph-spec/backend/binary-modes.yml for the distribution plan.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # GitHub Releases publish

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Mask placeholder dist from git
        # `pnpm build` overwrites the committed placeholder
        # dashboard/dist/index.html. That leaves the working tree dirty,
        # and GoReleaser refuses to release from a dirty tree. We can't
        # simply commit the change either — that would advance HEAD past
        # the release tag, and GoReleaser also rejects "tag not made
        # against HEAD".
        #
        # `git update-index --skip-worktree` tells git to ignore
        # subsequent local changes to that tracked file. Vite still
        # rewrites it on disk (so go:embed picks up the real UI), but
        # `git status` stays clean. New files Vite produces under
        # dashboard/dist/ are already covered by `dist/*` in
        # dashboard/.gitignore, so they don't show as untracked either.
        run: |
          git update-index --skip-worktree dashboard/dist/index.html

      - name: Build dashboard
        # GoReleaser builds the engine binary which embeds dashboard/dist
        # via go:embed. The placeholder index.html ships in git for local
        # `go build` convenience; the real release embeds the Vite output.
        # Studio used to ship as a second build step here — it's now
        # folded into the dashboard at /playground, /builder,
        # /deployments, /inspector and there is no separate Studio build.
        run: |
          pnpm -C dashboard install --frozen-lockfile
          pnpm -C dashboard build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT scoped to Duragraph/homebrew-tap with contents:write.
          # Without this, GoReleaser will fail at the brews step.
          INFISICAL_HOMEBREW_TAP_TOKEN: ${{ secrets.INFISICAL_HOMEBREW_TAP_TOKEN }}
