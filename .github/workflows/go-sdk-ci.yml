name: Go SDK CI

on:
  push:
    branches: [main]
    paths:
      - 'go-sdk/**'
      - '.github/workflows/go-sdk-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'go-sdk/**'
      - '.github/workflows/go-sdk-ci.yml'

env:
  GO_VERSION: '1.23'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']
    defaults:
      run:
        working-directory: go-sdk
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.go-version == '1.23'
        with:
          files: go-sdk/coverage.out
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go-sdk
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: go-sdk

  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go-sdk
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || echo "::warning::govulncheck found vulnerabilities (may include unfixable stdlib issues on Go ${{ env.GO_VERSION }})"
