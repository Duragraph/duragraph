name: Examples CI

on:
  push:
    branches: [main]
    paths:
      - 'examples/**'
      - '.github/workflows/examples-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'examples/**'
      - '.github/workflows/examples-ci.yml'

jobs:
  python-syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.11

      - name: Compile Python examples
        run: |
          set -euo pipefail
          shopt -s nullglob
          for example in examples/python/*/main.py; do
            echo "Compiling $example"
            uv run --with-requirements "$(dirname $example)/requirements.txt" \
              python -m py_compile "$example" || \
              uv run python -m py_compile "$example"
          done

  go-build:
    name: Go build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build Go examples
        # Each example's go.mod has a `replace github.com/duragraph/
        # duragraph/go-sdk => ../../../go-sdk` directive so it builds
        # against the local SDK source (HEAD) rather than fetching from
        # the proxy (which would only resolve once a `go-sdk/v*` tag is
        # cut). `go mod tidy` resolves the replace + writes go.sum since
        # examples don't commit go.sum.
        run: |
          set -euo pipefail
          shopt -s nullglob
          for example in examples/go/*/; do
            if [ -f "$example/main.go" ] || [ -f "$example/go.mod" ]; then
              echo "Building $example"
              (
                cd "$example"
                if [ -f go.mod ]; then
                  go mod tidy
                fi
                go build ./...
                if find . -name "*_test.go" | grep -q .; then
                  go test ./...
                fi
                go vet ./...
              )
            fi
          done
