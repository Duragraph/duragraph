name: Examples CI

on:
  push:
    branches: [main]
    paths:
      - 'examples/**'
      - '.github/workflows/examples-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'examples/**'
      - '.github/workflows/examples-ci.yml'

jobs:
  python-syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.11

      - name: Compile Python examples
        run: |
          set -euo pipefail
          shopt -s nullglob
          for example in examples/python/*/main.py; do
            echo "Compiling $example"
            uv run --with-requirements "$(dirname $example)/requirements.txt" \
              python -m py_compile "$example" || \
              uv run python -m py_compile "$example"
          done

  # NOTE: Go-build job intentionally omitted in this PR.
  # examples/go/* depends on github.com/duragraph/duragraph-go which
  # hasn't been imported into the monorepo yet (planned in the next
  # import PR — go-sdk/). The example references SDK APIs (e.g.
  # worker.WithName) that aren't in the last published v0.1.0 — they
  # were authored against an unreleased dev branch.
  # Once go-sdk/ lands, this job comes back, with a replace directive
  # in each example's go.mod pointing at ../go-sdk so they build
  # against the local SDK source.
