name: Examples CI

on:
  push:
    branches: [main]
    paths:
      - 'examples/**'
      - '.github/workflows/examples-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'examples/**'
      - '.github/workflows/examples-ci.yml'

jobs:
  python-syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.11

      - name: Compile Python examples
        run: |
          set -euo pipefail
          shopt -s nullglob
          for example in examples/python/*/main.py; do
            echo "Compiling $example"
            uv run --with-requirements "$(dirname $example)/requirements.txt" \
              python -m py_compile "$example" || \
              uv run python -m py_compile "$example"
          done

  go-build:
    name: Go build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build Go examples
        run: |
          set -euo pipefail
          shopt -s nullglob
          for example in examples/go/*/; do
            if [ -f "$example/main.go" ] || [ -f "$example/go.mod" ]; then
              echo "Building $example"
              (
                cd "$example"
                if [ -f go.mod ]; then
                  # `go mod tidy` resolves + writes go.sum (examples don't
                  # commit go.sum). `go build` otherwise fails on missing
                  # go.sum entries even though deps are downloadable.
                  go mod tidy
                fi
                go build ./...
                if find . -name "*_test.go" | grep -q .; then
                  go test ./...
                fi
                go vet ./...
              )
            fi
          done
