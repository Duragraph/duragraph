# DuraGraph on Scaleway Serverless Containers — single container,
# embedded Postgres + NATS. State persists on the local SSD volume
# mounted at /data.

version: "1.0"
name: duragraph

services:
  api:
    type: container
    name: duragraph
    port: 8080
    protocol: http
    privacy: public
    min_scale: 1
    max_scale: 1 # embedded Postgres pins the container to a single instance
    cpu_limit: 1000
    memory_limit: 1024

    image:
      name: duragraph
      build:
        context: .
        dockerfile: deploy/docker/Dockerfile.server

    # Override the image CMD to boot in embedded mode.
    command:
      - "./duragraph"
      - "dev"
      - "--port"
      - "8080"
      - "--data-dir"
      - "/data"

    health_check:
      path: /health
      port: 8080
      interval: 30s
      timeout: 5s
      unhealthy_threshold: 3
      healthy_threshold: 2

    volumes:
      - type: local_ssd
        name: duragraph-data
        mount_path: /data
        size: 10

    environment:
      - name: HOST
        value: "0.0.0.0"

    secrets:
      # Optional LLM provider keys + auth toggles.
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
      - AUTH_PASSWORD_ENABLED
      - AUTH_OAUTH_ENABLED
