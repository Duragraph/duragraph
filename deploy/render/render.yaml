# DuraGraph on Render — single container, embedded Postgres + NATS.
#
# `duragraph dev` ships its own Postgres + NATS JetStream baked into
# the binary, so this template does NOT provision a managed Render
# Postgres or a separate NATS service. State lives on the attached
# persistent disk at /data.

services:
  - type: web
    name: duragraph
    runtime: docker
    dockerfilePath: ./deploy/docker/Dockerfile.server
    dockerContext: .
    plan: starter
    region: oregon

    # Render injects $PORT at runtime. Bind the engine to it.
    dockerCommand: "./duragraph dev --port $PORT --data-dir /data"

    healthCheckPath: /health

    disk:
      name: duragraph-data
      mountPath: /data
      sizeGB: 5

    envVars:
      - key: HOST
        value: 0.0.0.0

      # Optional LLM provider keys — set via the Render dashboard if you
      # want assistants backed by real models. Workers fall through to a
      # rule-based mock when these are absent.
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

      # Three-flag auth split (the old single `AUTH_ENABLED` is gone).
      # Set to "true" to require email+password login. First registered
      # user is auto-promoted to admin (bootstrap admin pattern).
      - key: AUTH_PASSWORD_ENABLED
        value: "false"
      - key: AUTH_OAUTH_ENABLED
        value: "false"
