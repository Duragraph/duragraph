app = "duragraph"
primary_region = "iad"

# DuraGraph runs as a single container with embedded PostgreSQL + NATS
# JetStream (the `duragraph dev` flavour of the binary). No managed
# Postgres or NATS sidecar to provision. Data lives on a persistent
# volume mounted at /data; replacing or moving the machine preserves
# the state as long as the volume is attached.

[build]
  dockerfile = "../docker/Dockerfile.server"

[experimental]
  # Override the image CMD so the binary boots in embedded mode.
  # Equivalent to `duragraph dev` on a laptop, but bound to 0.0.0.0
  # and using the mounted volume for persistence.
  cmd = ["./duragraph", "dev", "--port", "8080", "--data-dir", "/data"]

[env]
  HOST = "0.0.0.0"

[[mounts]]
  source = "duragraph_data"
  destination = "/data"
  # First boot will create the embedded postgres data dir + NATS
  # JetStream stream dir under here. Tune size in `flyctl volumes
  # create duragraph_data --size <gb>`.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[services]]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 500
