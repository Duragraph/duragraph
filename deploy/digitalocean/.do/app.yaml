# DuraGraph on DigitalOcean App Platform — single container, embedded
# Postgres + NATS. No managed dev database to provision; state lives
# under /data on the attached volume.

name: duragraph
region: nyc

services:
  - name: api
    dockerfile_path: deploy/docker/Dockerfile.server
    github:
      repo: Duragraph/duragraph
      branch: main
      deploy_on_push: true
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs

    # Override the image CMD to boot in embedded mode.
    run_command: "./duragraph dev --port 8080 --data-dir /data"

    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

    envs:
      - key: HOST
        value: "0.0.0.0"

      # Optional LLM provider keys — secrets, set in the DigitalOcean
      # console. Assistants without these fall back to a rule-based mock.
      - key: OPENAI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
        type: SECRET

      # Three-flag auth split.
      - key: AUTH_PASSWORD_ENABLED
        value: "false"
      - key: AUTH_OAUTH_ENABLED
        value: "false"
