# tygo — generate TypeScript types from Go DTOs.
#
# Source: internal/infrastructure/http/dto/* — the canonical wire
# shapes the engine ships over /api/v1. Output: a single
# dashboard/src/types/generated.ts file imported by route handlers
# and the API client. The dashboard MUST NOT hand-roll request /
# response interfaces for these endpoints; rerun `task gen:types`
# whenever the DTOs change.
#
# Domain enums (RunStatus, etc.) live in the domain packages, not
# under dto/. We pull `internal/domain/run` for RunStatus so the
# frontend's status badges have a single source of truth too.
packages:
  - path: "github.com/duragraph/duragraph/internal/infrastructure/http/dto"
    output_path: "dashboard/src/types/generated.ts"
    type_mappings:
      time.Time: "string /* RFC3339 timestamp */"
      uuid.UUID: "string /* UUID */"
      json.RawMessage: "unknown"
    frontmatter: |
      // ⚠ Generated by tygo from internal/infrastructure/http/dto.
      // Do not edit by hand. Run `task gen:types` after changing DTOs.
